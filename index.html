<!doctype html>
<html>
<head>
<script>
function odd_even(){
var no;
no=Number(document.getElementById("no_input").value);
if(no==1)
{
alert("If you were a fruit, you’d be a ‘fine-apple’.");
}
else if(no==2)
{
alert("We took a class together right? Pretty sure it was chemistry.");
}
else if(no==3)
{
alert("Are you a 45-degree angle? Because you're a-cutie");
}
else if(no==4)
{
alert("I’d say, ‘God bless you,’ but it looks like he already did.");
}
}
</script>
</head>
<body>
Enter A Number between 1 and 4:<input id="no_input"><br />
<button onclick="odd_even()">Click</button>
</body>
</html>
